name: SignalAtlas — Deep Research Compiler

on:
  schedule:
    # Run once a day at 03:00 UTC (8:30 AM IST) to generate an evergreen piece automatically
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      research_topic:
        description: 'Geopolitical Topic to Research (Leave empty for auto-selected backlog)'
        required: false
        default: ''

jobs:
  run-compiler:
    name: Compile Deep Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: |
          cd pipeline
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh topics cache from Supabase (avoid re-publishing)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'EOF'
          import os, json, urllib.request

          url = os.environ.get('SUPABASE_URL', '')
          key = os.environ.get('SUPABASE_SERVICE_ROLE_KEY', '')
          if not url or not key:
              print("No Supabase creds — skipping cache refresh")
              exit(0)

          hdrs = {'apikey': key, 'Authorization': 'Bearer ' + key}
          req = urllib.request.Request(
              url + '/rest/v1/articles?select=title&status=eq.published&order=published_at.desc&limit=500',
              headers=hdrs
          )
          with urllib.request.urlopen(req) as r:
              articles = json.loads(r.read())

          titles = [a['title'] for a in articles if a.get('title')]
          with open('pipeline/published_topics.json', 'w') as f:
              json.dump(titles, f, indent=2)

          print(f"Synced {len(titles)} published titles to cache")
          EOF

      - name: Run Deep Geopolitical Research Compiler
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd pipeline
          echo "=== Starting Deep Research Compiler ==="
          echo "Topic Input: '${{ github.event.inputs.research_topic }}'"
          python research_compiler.py "${{ github.event.inputs.research_topic }}"
          echo "=== Compiler Complete ==="

      - name: Commit updated topics cache
        run: |
          git config --global user.name "signalatlas-bot"
          git config --global user.email "bot@signalatlas.com"
          git add pipeline/published_topics.json
          git diff --quiet && git diff --staged --quiet \
            || git commit -m "chore: sync deep compiler topics cache [skip ci]" \
            && git push

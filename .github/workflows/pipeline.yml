name: Daily Geopolitics Research Pipeline

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows you to trigger this workflow manually from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd pipeline
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pipeline script
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: |
        cd pipeline
        python scheduler.py

    - name: Commit cached topics back to repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add pipeline/published_topics.json
        # Only commit and push if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update published topics cache [skip ci]" && git push)

name: SignalAtlas — Daily Article Pipeline

on:
  schedule:
    # Run 3 times/day: 01:30, 07:30, 13:30 UTC = 7am, 1pm, 7pm IST
    - cron: '30 1 * * *'   # Run 1 — 01:30 UTC (7:00 AM IST)
    - cron: '30 7 * * *'   # Run 2 — 07:30 UTC (1:00 PM IST)
    - cron: '30 13 * * *'  # Run 3 — 13:30 UTC (7:00 PM IST)
  workflow_dispatch:
    inputs:
      articles_count:
        description: 'Number of articles to generate (default: 5)'
        required: false
        default: '5'
      force_refresh:
        description: 'Clear published_topics cache before running?'
        required: false
        type: boolean
        default: false

jobs:
  run-pipeline:
    name: Generate ${{ github.event.inputs.articles_count || '5' }} articles
    runs-on: ubuntu-latest
    timeout-minutes: 90   # 5 articles × ~15 min each = 75 min max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: |
          cd pipeline
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: (Optional) Clear published topics cache
        if: ${{ github.event.inputs.force_refresh == 'true' }}
        run: |
          echo "[]" > pipeline/published_topics.json
          echo "Cache cleared — all topics eligible for regeneration"

      - name: Refresh topics cache from Supabase (avoid re-publishing)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'EOF'
          import os, json, urllib.request

          url = os.environ.get('SUPABASE_URL', '')
          key = os.environ.get('SUPABASE_SERVICE_ROLE_KEY', '')
          if not url or not key:
              print("No Supabase creds — skipping cache refresh")
              exit(0)

          hdrs = {'apikey': key, 'Authorization': 'Bearer ' + key}
          req = urllib.request.Request(
              url + '/rest/v1/articles?select=title&status=eq.published&order=published_at.desc&limit=500',
              headers=hdrs
          )
          with urllib.request.urlopen(req) as r:
              articles = json.loads(r.read())

          titles = [a['title'] for a in articles if a.get('title')]
          with open('pipeline/published_topics.json', 'w') as f:
              json.dump(titles, f, indent=2)

          print(f"Synced {len(titles)} published titles to cache")
          EOF

      - name: Run article generation pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_count || '5' }}
          DELAY_BETWEEN_SECS: '45'
        run: |
          cd pipeline
          echo "=== Starting SignalAtlas Pipeline ==="
          echo "Time: $(date -u)"
          echo "Articles per run: $ARTICLES_PER_RUN"
          python scheduler.py
          echo "=== Pipeline Complete ==="

      - name: Commit updated topics cache
        run: |
          git config --global user.name "signalatlas-bot"
          git config --global user.email "bot@signalatlas.com"
          git add pipeline/published_topics.json
          git diff --quiet && git diff --staged --quiet \
            || git commit -m "chore: sync published_topics cache [skip ci]" \
            && git push

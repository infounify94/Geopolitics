name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'signalatlas/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# NOTE: pipeline.yml commits use [skip ci] so they do NOT trigger this workflow.
# New articles appear on the site via ISR (revalidate) without any redeploy.

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: signalatlas/package-lock.json

      - name: Install dependencies
        working-directory: signalatlas
        run: npm ci

      - name: Build Next.js for Cloudflare Pages
        working-directory: signalatlas
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npm run pages:build

      - name: Deploy to Cloudflare Pages via Wrangler CLI
        working-directory: signalatlas
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy .vercel/output/static \
            --project-name=signalatlas \
            --branch=main \
            --commit-dirty=true

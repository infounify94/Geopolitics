name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'signalatlas/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    # Also allows manual trigger from Actions tab

# NOTE: The pipeline.yml uses [skip ci] on its commits so it does NOT trigger this workflow.
# New articles appear on the site via ISR (revalidate=3600) without any redeploy.

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: signalatlas/package-lock.json

      - name: Install dependencies
        run: |
          cd signalatlas
          npm ci

      - name: Build with next-on-pages (Cloudflare adapter)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: 'https://signalatlas.pages.dev'
        run: |
          cd signalatlas
          npm run pages:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=signalatlas --branch=main
          workingDirectory: signalatlas

